# =====================================================================
# K8s Health Monitor — Cluster Configuration
# =====================================================================
# Each cluster points at its own kubeconfig file. The dashboard treats
# every cluster the same way: it loads the kubeconfig and lets the file's
# auth machinery (embedded token, exec plugin, etc.) handle credentials.
#
# Sanity-check each file with:
#   KUBECONFIG=<path> kubectl get nodes
# If that works, the dashboard will too.
# =====================================================================

refresh_interval_seconds: 30

clusters:

